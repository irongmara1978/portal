<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marks Entry Table | Irongmara ME School</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:linear-gradient(135deg,#eef2f7,#d9e4f5);
}

/* HEADER */

.header{
background:#002147;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.teacher-info{
font-size:14px;
}

.teacher-info a{
color:#ffb3b3;
text-decoration:none;
margin-left:10px;
font-weight:bold;
}

/* MAIN CARD */

.container{
max-width:1000px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* DETAILS */

.details{
margin-bottom:20px;
font-size:15px;
color:#333;
line-height:1.7;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#002147;
color:white;
}

input{
width:70px;
padding:6px;
text-align:center;
border:1px solid #ccc;
border-radius:4px;
}

/* BUTTON */

.btn-area{
text-align:center;
margin-top:25px;
}

button{
padding:12px 30px;
background:#f37021;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#d65a12;
}

/* MOBILE */

@media(max-width:700px){

.container{
margin:20px;
padding:20px;
}

table{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="header">

<h2>IRONGMARA ME SCHOOL</h2>

<div class="teacher-info">
Welcome, <span id="teacherDisplay"></span> |
<a href="#" onclick="logout()">Logout</a>
</div>

</div>


<div class="container">

<h3>Marks Entry</h3>

<div class="details">

<strong>Academic Session:</strong> <span id="session"></span><br>
<strong>Examination:</strong> <span id="exam"></span><br>
<strong>Class:</strong> <span id="class"></span><br>
<strong>Subject:</strong> <span id="subject"></span>

</div>


<table>

<thead>

<tr>
<th>Adm No</th>
<th>Roll No</th>
<th>Student Name</th>
<th>Marks</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>


</table>


<div class="btn-area">

<button onclick="saveMarks()">Save Marks</button>
</div>

</div>

<script>

var teacher = sessionStorage.getItem("teacherName");

if(!teacher){
window.location.href="login.html";
}

document.getElementById("teacherDisplay").innerText = teacher;

function logout(){
sessionStorage.clear();
window.location.href="login.html";
}


var params = new URLSearchParams(window.location.search);

var className = params.get("class");

document.getElementById("session").innerText = params.get("session");
document.getElementById("exam").innerText = params.get("exam");
document.getElementById("class").innerText = className;
document.getElementById("subject").innerText = params.get("subject");


/* LOAD STUDENTS */

var scriptURL="https://script.google.com/macros/s/AKfycbxdeCzfy1gRAupiiq2yAltl1RAk-nxUU80Fagur8OQ0XbioiyOAIEu6mo3hRV3kRTHn6w/exec";

fetch(scriptURL + "?class=" + className)
.then(res => res.json())
.then(data => {

var table = document.getElementById("studentTable");

data.forEach(s => {

var row = `
<tr>
<td>${s.adm}</td>
<td>${s.roll}</td>
<td>${s.name}</td>
<td>
<input type="number" class="marks">
<button class="editBtn" style="display:none;">Edit</button>
</td>
</tr>
`;
table.innerHTML += row;

});

});

function saveMarks(){

var rows = document.querySelectorAll("#studentTable tr");

var marksData = [];

rows.forEach(row=>{

var adm = row.children[0].innerText;
var marks = row.children[3].querySelector("input").value;

marksData.push({
adm: adm,
marks: marks
});

});

var payload = {

class: document.getElementById("class").innerText,
exam: document.getElementById("exam").innerText,
subject: document.getElementById("subject").innerText,
marks: marksData

};


fetch(scriptURL,{
method:"POST",
body:JSON.stringify(payload)
})
.then(res=>res.json())
.then(data=>{

alert("Marks Saved Successfully");

});

}

</script>
</body>

</html>
