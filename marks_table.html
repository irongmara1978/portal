<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marks Entry Table | Irongmara ME School</title>
<style>
body{margin:0; font-family:'Segoe UI',Arial; background:linear-gradient(135deg,#eef2f7,#d9e4f5);}
.header{background:#002147; color:white; padding:18px 25px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
.teacher-info{font-size:14px;}
.teacher-info a{color:#ffb3b3; text-decoration:none; margin-left:10px; font-weight:bold;}
.container{max-width:1000px; margin:40px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 8px 25px rgba(0,0,0,0.15);}
.details{margin-bottom:20px; font-size:15px; color:#333; line-height:1.7;}

/* ADDED SEARCH BAR STYLE */
.search-area{margin-bottom: 20px;}
#searchInput{width: 100%; padding: 10px; border: 2px solid #002147; border-radius: 6px; box-sizing: border-box;}

table{width:100%; border-collapse:collapse; margin-top:20px;}
th,td{border:1px solid #ccc; padding:8px; text-align:center;}
th{background:#002147; color:white;}
input{width:70px; padding:6px; text-align:center; border:1px solid #ccc; border-radius:4px;}
.btn-area{text-align:center; margin-top:25px;}
button{padding:12px 30px; background:#f37021; border:none; color:white; font-weight:bold; border-radius:6px; cursor:pointer;}
button:hover{background:#d65a12;}
.editBtn{padding: 5px 10px; margin-left: 5px; font-size: 12px;}
@media(max-width:700px){.container{margin:20px; padding:20px;} table{font-size:13px;}}
</style>
</head>

<body>
<div class="header">
    <h2>IRONGMARA ME SCHOOL</h2>
    <div class="teacher-info">Welcome, <span id="teacherDisplay"></span> | <a href="#" onclick="logout()">Logout</a></div>
</div>

<div class="container">
    <h3>Marks Entry</h3>
    <div class="details">
        <strong>Academic Session:</strong> <span id="session"></span><br>
        <strong>Examination:</strong> <span id="exam"></span><br>
        <strong>Class:</strong> <span id="class"></span><br>
        <strong>Subject:</strong> <span id="subject"></span>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Search by Name or Roll No..." onkeyup="filterTable()">
    </div>

    <table>
        <thead>
            <tr><th>Adm No</th><th>Roll No</th><th>Student Name</th><th>Marks</th></tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

    <div class="btn-area">
        <button id="saveBtn" onclick="saveMarks()">Save Marks</button>
    </div>
</div>

<script>
var teacher = sessionStorage.getItem("teacherName");
if(!teacher){window.location.href="login.html";}
document.getElementById("teacherDisplay").innerText = teacher;

function logout(){sessionStorage.clear(); window.location.href="login.html";}

var params = new URLSearchParams(window.location.search);
var className = params.get("class");
var scriptURL="https://script.google.com/macros/s/AKfycbx7jhZHqByTxApryRp8t3zQSSx9w_iKtHUKQev8is7gVUKSVdNJOJXUUkafkOKlTn_c7g/exec";

document.getElementById("session").innerText = params.get("session");
document.getElementById("exam").innerText = params.get("exam");
document.getElementById("class").innerText = className;
document.getElementById("subject").innerText = params.get("subject");

function loadStudents() {
    var exam = params.get("exam");
    var subject = params.get("subject");
    fetch(scriptURL + "?class=" + className + "&exam=" + exam + "&subject=" + subject)
    .then(res => res.json())
    .then(data => {
        var table = document.getElementById("studentTable");
        table.innerHTML = "";
        data.forEach(s => {
            // Standard: Show blank if 'AB' is in sheet
            var marksValue = s.marks === 'AB' ? '' : (s.marks || '');
            var row = `<tr>
                <td>${s.adm}</td>
                <td>${s.roll}</td>
                <td>${s.name}</td>
                <td>
                    <input type="text" class="marks" value="${marksValue}" ${s.marks ? 'readonly' : ''} oninput="validateMarks(this)">
                    <button class="editBtn" ${s.marks ? '' : 'style="display:none;"'}>Edit</button>
                </td></tr>`;
            table.innerHTML += row;
        });
        var nextInput = document.querySelector(".marks:not([readonly])");
        if (nextInput) nextInput.focus();
    });
}
loadStudents();

function filterTable() {
    var filter = document.getElementById("searchInput").value.toUpperCase();
    var rows = document.querySelectorAll("#studentTable tr");
    rows.forEach(row => {
        var roll = row.children[1].innerText.toUpperCase();
        var name = row.children[2].innerText.toUpperCase();
        row.style.display = (name.includes(filter) || roll.includes(filter)) ? "" : "none";
    });
}

function saveMarks(){
    var rows = document.querySelectorAll("#studentTable tr");
    var marksData = [];
    var exam = document.getElementById("exam").innerText;
    var maxLimit = exam.includes("Summative") ? 100 : 50;
    var minLimit = exam.includes("Summative") ? 30 : 15;

    for(var i=0;i<rows.length;i++){
        var input = rows[i].querySelector(".marks");
        if (input.hasAttribute("readonly")) continue;
        var val = input.value.trim();
        
        if (val !== "") {
            var marks = Number(val);
            if (isNaN(marks) || marks < 0 || marks > maxLimit) {
                alert("Invalid marks for ADM: " + rows[i].children[0].innerText + "\nLimit: 0 to " + maxLimit);
                input.focus(); return;
            }
            marksData.push({ adm: rows[i].children[0].innerText, marks: marks });
        } else {
            // Blank sends signal for 'AB'
            marksData.push({ adm: rows[i].children[0].innerText, marks: "" });
        }
    }

    if (marksData.length === 0) return alert("No new marks to save.");
    document.getElementById("saveBtn").innerText = "Saving...";
    document.getElementById("saveBtn").disabled = true;

    fetch(scriptURL,{ method:"POST", body:JSON.stringify({
        class: className, exam: exam, subject: document.getElementById("subject").innerText, marks: marksData
    })}).then(() => {
        alert("Marks Saved Successfully");
        document.getElementById("saveBtn").innerText = "Save Marks";
        document.getElementById("saveBtn").disabled = false;
        loadStudents();
    });
}

document.addEventListener("click",function(e){
    if(e.target.classList.contains("editBtn")){
        var input = e.target.closest("tr").querySelector(".marks");
        input.removeAttribute("readonly");
        input.focus();
    }
});

function validateMarks(input){
    var exam = document.getElementById("exam").innerText;
    var max = exam.includes("Summative") ? 100 : 50;
    input.style.border = (Number(input.value) > max) ? "2px solid red" : "1px solid #ccc";
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        var active = document.activeElement;
        if(active.classList.contains("marks")){
            e.preventDefault();
            var inputs = Array.from(document.querySelectorAll(".marks"));
            var index = inputs.indexOf(active);
            if(index > -1 && index < inputs.length - 1){ inputs[index + 1].focus(); }
        }
    }
});
</script>
</body>
</html>
