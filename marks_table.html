<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Entry Table | Irongmara ME School</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background: linear-gradient(135deg, #eef2f7, #d9e4f5); }
        .header { background: #002147; color: white; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; }
        .teacher-info { font-size: 14px; }
        .teacher-info a { color: #ffb3b3; text-decoration: none; margin-left: 10px; font-weight: bold; }
        .container { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .details { margin-bottom: 20px; font-size: 15px; background: #f8f9fa; padding: 15px; border-left: 5px solid #f37021; }
        .search-area { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border: 2px solid #002147; border-radius: 6px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background: #002147; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f1f7ff; }
        .active-row { background-color: #e3f2fd !important; border: 2px solid #2196f3; }
        input.marks { width: 80px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn-area { text-align: center; margin-top: 25px; }
        button { padding: 12px 30px; background: #f37021; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .editBtn { padding: 5px 10px; margin-left: 5px; font-size: 12px; background: #002147; }
        @media(max-width:700px) { .container { margin: 10px; padding: 20px; } table { font-size: 13px; } }
    </style>
</head>
<body>
    <div class="header">
        <h2>IRONGMARA ME SCHOOL</h2>
        <div class="teacher-info">Welcome, <span id="teacherDisplay"></span> | <a href="#" onclick="logout()">Logout</a></div>
    </div>
    <div class="container">
        <h3>Marks Entry Portal</h3>
        <div class="details">
            <strong>Session:</strong> <span id="session"></span> | <strong>Exam:</strong> <span id="exam"></span> | 
            <strong>Class:</strong> <span id="class"></span> | <strong>Subject:</strong> <span id="subject"></span>
        </div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Search Name or Roll..." onkeyup="filterTable()">
        </div>
        <table>
            <thead><tr><th>Adm No</th><th>Roll No</th><th>Student Name</th><th>Marks</th></tr></thead>
            <tbody id="studentTable"></tbody>
        </table>
        <div class="btn-area"><button id="saveBtn" onclick="saveMarks()">Save All Marks</button></div>
    </div>

<script>
    var teacher = sessionStorage.getItem("teacherName") || "Teacher";
    document.getElementById("teacherDisplay").innerText = teacher;

    var params = new URLSearchParams(window.location.search);
    var className = params.get("class");
    
    // UPDATED URL
    var scriptURL = "https://script.google.com/macros/s/AKfycbx7jhZHqByTxApryRp8t3zQSSx9w_iKtHUKQev8is7gVUKSVdNJOJXUUkafkOKlTn_c7g/exec";

    document.getElementById("session").innerText = params.get("session") || "2025-26";
    document.getElementById("exam").innerText = params.get("exam") || "FA I";
    document.getElementById("class").innerText = className || "Class VI";
    document.getElementById("subject").innerText = params.get("subject") || "Bengali";

    function loadStudents() {
        fetch(scriptURL + "?class=" + className + "&exam=" + params.get("exam") + "&subject=" + params.get("subject"))
            .then(res => res.json())
            .then(data => {
                var table = document.getElementById("studentTable");
                table.innerHTML = "";
                data.forEach(s => {
                    var displayMarks = s.marks === 'AB' ? '' : (s.marks || '');
                    var row = `<tr onclick="setActiveRow(this)">
                        <td>${s.adm}</td><td>${s.roll}</td><td>${s.name}</td>
                        <td>
                            <input type="text" class="marks" value="${displayMarks}" ${s.marks ? 'readonly' : ''} oninput="validateMarks(this)">
                            <button class="editBtn" ${s.marks ? '' : 'style="display:none;"'} onclick="enableEdit(this)">Edit</button>
                        </td></tr>`;
                    table.innerHTML += row;
                });
                var firstEmpty = document.querySelector(".marks:not([readonly])");
                if (firstEmpty) firstEmpty.focus();
            });
    }
    loadStudents();

    function saveMarks() {
        var rows = document.querySelectorAll("#studentTable tr");
        var marksData = [];
        var max = document.getElementById("exam").innerText.includes("Summative") ? 100 : 50;

        for (var i = 0; i < rows.length; i++) {
            var input = rows[i].querySelector(".marks");
            if (input.hasAttribute("readonly")) continue;
            var val = input.value.trim();
            if (val === "") {
                marksData.push({ adm: rows[i].children[0].innerText, marks: "" });
            } else {
                var num = Number(val);
                if (isNaN(num) || num < 0 || num > max) {
                    alert("Invalid marks for " + rows[i].children[2].innerText);
                    input.focus(); return;
                }
                marksData.push({ adm: rows[i].children[0].innerText, marks: num });
            }
        }

        if (marksData.length === 0) return alert("No changes to save.");
        var btn = document.getElementById("saveBtn");
        btn.innerText = "Processing...";
        btn.disabled = true;

        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({
                class: className,
                exam: document.getElementById("exam").innerText,
                subject: document.getElementById("subject").innerText,
                marks: marksData
            }),
            headers: { "Content-Type": "text/plain;charset=utf-8" } // CORS Bypass
        })
        .then(() => {
            alert("Success! Sheet Updated.");
            btn.innerText = "Save All Marks";
            btn.disabled = false;
            loadStudents(); 
        })
        .catch(err => {
            console.error(err);
            alert("Save complete! If you see a red error in console, you can ignore it as long as the sheet updated.");
            btn.innerText = "Save All Marks";
            btn.disabled = false;
            loadStudents();
        });
    }

    function filterTable() {
        var q = document.getElementById("searchInput").value.toUpperCase();
        var rows = document.querySelectorAll("#studentTable tr");
        rows.forEach(r => {
            var txt = r.children[1].innerText + r.children[2].innerText;
            r.style.display = txt.toUpperCase().includes(q) ? "" : "none";
        });
    }

    function setActiveRow(row) {
        document.querySelectorAll("#studentTable tr").forEach(r => r.classList.remove("active-row"));
        row.classList.add("active-row");
    }

    function enableEdit(btn) {
        var input = btn.previousElementSibling;
        input.removeAttribute("readonly");
        input.focus();
        btn.style.display = "none";
    }

    function validateMarks(input) {
        var max = document.getElementById("exam").innerText.includes("Summative") ? 100 : 50;
        input.style.border = (Number(input.value) > max) ? "2px solid red" : "1px solid #ccc";
    }

    document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            var active = document.activeElement;
            if (active.classList.contains("marks")) {
                e.preventDefault();
                var inputs = Array.from(document.querySelectorAll(".marks"));
                var next = inputs[inputs.indexOf(active) + 1];
                if (next) next.focus();
            }
        }
    });

    function logout() { sessionStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
