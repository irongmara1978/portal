<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Irongmara ME School</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('staff.jpg') no-repeat center center;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:35px;
    border-radius:8px;
    width:320px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.login-box h2{
    margin-bottom:20px;
    color:#004aad;
}

.login-box input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.login-box button:hover{
    background:#003580;
}

.message{
    margin-top:10px;
    color:red;
}

.back-link{
    margin-top:15px;
    display:block;
    text-decoration:none;
    font-size:14px;
    color:#004aad;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="login_id" placeholder="Login ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="message" id="message"></div>
    <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzvKLI_5mIJu4dpVqqmhZsnWMnymTuN74e7xxz6nzG01SO75e0Hj1DImD_QpEuzvLs/exec";

function login(){
    const login_id = document.getElementById("login_id").value;
    const password = document.getElementById("password").value;

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({login_id, password})
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){

sessionStorage.setItem("teacherName", data.teacher_name);
sessionStorage.setItem("sessionToken", data.session_token);

window.location.href="module.html";

} else {
            document.getElementById("message").innerText="Invalid Login ID or Password";
        }
    })
    .catch(error=>{
        document.getElementById("message").innerText="Server Error";
    });
}
</script>

</body>
</html>
